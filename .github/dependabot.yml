version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    # GitHub Actions does not support SemVer — only default-days is effective.
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns:
          - "*"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
